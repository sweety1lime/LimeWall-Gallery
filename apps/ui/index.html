<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LimeWall</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <!-- Custom titlebar (window has no native decorations) -->
      <header class="titlebar" data-tauri-drag-region>
        <div class="tb-left" data-tauri-drag-region>
          <span id="tb-logo" class="tb-logo"></span>
          <span class="tb-title">LimeWall</span>
          <span class="tb-brand">by 2fame</span>
        </div>
        <div class="tb-right">
          <span id="conn" class="conn">
            <span class="conn-dot"></span>
            <span id="conn-text">…</span>
          </span>
          <button id="gallery-open" class="tb-text-btn" type="button">Каталог</button>
          <button id="settings-open" class="icon-btn" type="button" title="Настройки"></button>
          <div class="win-controls">
            <button id="win-min" class="win-btn" type="button" title="Свернуть"></button>
            <button id="win-max" class="win-btn" type="button" title="Развернуть"></button>
            <button id="win-close" class="win-btn win-close" type="button" title="Закрыть"></button>
          </div>
        </div>
      </header>

      <!-- State views are built here by main.ts: offline | empty | populated -->
      <main id="content" class="content"></main>
    </div>

    <!-- Settings slide-over -->
    <div id="settings" class="settings-overlay" hidden></div>

    <!-- Transient status / error toast -->
    <div id="toast" class="toast" hidden></div>
  </body>
</html>
